kind = "mobile"
previewPath = "/lms-mobile/"
title = "LMS Student Mobile App"
version = "1.0.0"
id = "artifacts/lms-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21752
name = "expo"
paths = ["/lms-mobile/"]

[services.development]
run = "pnpm --filter @workspace/lms-mobile run dev"

[services.env]
PORT = "21752"
BASE_PATH = "/lms-mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lms-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/lms-mobile", "run", "serve"]
