kind = "web"
previewPath = "/"
title = "LMS Admin & Instructor Portal"
version = "1.0.0"
id = "artifacts/lms-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21957
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/lms-web run dev"

[services.env]
PORT = "21957"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/lms-web", "run", "build"]
publicDir = "artifacts/lms-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
