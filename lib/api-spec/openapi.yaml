openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LMS E-Learning System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: courses
    description: Course management
  - name: users
    description: User management
  - name: exams
    description: Exam management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health:
    get:
      operationId: healthMonitor
      tags: [health]
      summary: Real-time health monitoring
      responses:
        "200":
          description: Health stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthMonitor"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
        "409":
          description: Email already exists

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and blacklist token
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /courses:
    get:
      operationId: getCourses
      tags: [courses]
      summary: Get all courses with search and pagination
      parameters:
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tags (uses MongoDB $all)
        - name: category
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Course list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseListResponse"

    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course (admin/instructor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Course created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"

  /courses/stats/aggregation:
    get:
      operationId: getCourseStats
      tags: [courses]
      summary: Aggregation stats (admin only)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a single course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"

    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"

    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Soft delete a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Soft deleted

  /courses/{id}/enroll:
    post:
      operationId: enrollCourse
      tags: [courses]
      summary: Enroll in a course (atomic)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enrolled

  /courses/{id}/reviews:
    post:
      operationId: addReview
      tags: [courses]
      summary: Add a review to a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review added

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: Get all users (admin)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateInput"
      responses:
        "200":
          description: Updated user

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Soft delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Soft deleted

  /exam/schema:
    get:
      operationId: getExamSchema
      tags: [exams]
      summary: Get exam JSON schema for dynamic form rendering
      responses:
        "200":
          description: Exam schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamSchemaResponse"

  /exams:
    post:
      operationId: createExam
      tags: [exams]
      summary: Create an exam from dynamic form data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Exam created

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    HealthMonitor:
      type: object
      properties:
        status:
          type: string
        uptime:
          type: number
        uptimeUnit:
          type: string
        timestamp:
          type: string
        memory:
          type: object
          properties:
            rss:
              type: number
            heapTotal:
              type: number
            heapUsed:
              type: number
            external:
              type: number
        memoryUnit:
          type: string
      required:
        - status
        - uptime

    RegisterInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [student, instructor, admin]
      required:
        - name
        - email
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        status:
          type: string
        token:
          type: string
        data:
          $ref: "#/components/schemas/UserData"
      required:
        - status

    UserData:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - id
        - name
        - email
        - role

    UserResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: "#/components/schemas/UserData"

    UserListResponse:
      type: object
      properties:
        status:
          type: string
        results:
          type: number
        total:
          type: number
        totalPages:
          type: number
        currentPage:
          type: number
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserData"

    UserUpdateInput:
      type: object
      properties:
        name:
          type: string
        role:
          type: string

    CourseInput:
      type: object
      properties:
        title:
          type: string
          minLength: 5
        description:
          type: string
        price:
          type: number
        discount:
          type: number
        category:
          type: string
          enum: [web-dev, mobile-dev, data-science, design, business, other]
        tags:
          type: array
          items:
            type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        seats:
          type: number
        videoUrl:
          type: string
      required:
        - title
        - description
        - price
        - category
        - level

    CourseData:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        discount:
          type: number
        salePrice:
          type: number
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        level:
          type: string
        seats:
          type: number
        enrolledCount:
          type: number
        averageRating:
          type: number
        instructor:
          type: object
          properties:
            name:
              type: string
            email:
              type: string
        createdAt:
          type: string

    CourseResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: "#/components/schemas/CourseData"

    CourseListResponse:
      type: object
      properties:
        status:
          type: string
        results:
          type: number
        total:
          type: number
        totalPages:
          type: number
        currentPage:
          type: number
        data:
          type: array
          items:
            $ref: "#/components/schemas/CourseData"

    ReviewInput:
      type: object
      properties:
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string
      required:
        - rating
        - comment

    StatsResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: array
          items:
            type: object

    ExamSchemaResponse:
      type: object
      properties:
        status:
          type: string
        schema:
          type: object
          additionalProperties: true
